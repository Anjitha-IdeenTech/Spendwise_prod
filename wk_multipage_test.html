<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
  @page {
    size: A4 portrait;
    margin: 0;
  }
  body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    padding: 0;
    background: #E2E8F0;
    -webkit-print-color-adjust: exact;
  }
  .page {
    width: 210mm;
    height: 297mm;
    box-sizing: border-box;
    padding: 20mm;
    background: #ffffff;
    page-break-after: always;
    position: relative;
    border-bottom: 5px solid #4F46E5;
  }
  .page:last-child {
    page-break-after: avoid;
  }
  h1 {
    color: #0F172A;
    margin-top: 0;
  }
  .footer {
    position: absolute;
    bottom: 20mm;
    left: 20mm;
    right: 20mm;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #64748B;
  }
</style>
</head>
<body>
  <div class="page">
    <h1>Page 1</h1>
    <p>This is the first page of our multi-page test.</p>
    <div class="footer">
      <span>Smart Spend Proposal</span>
      <span>Page 1 of 3</span>
    </div>
  </div>
  <div class="page">
    <h1>Page 2</h1>
    <p>This is the second page.</p>
    <div class="footer">
      <span>Smart Spend Proposal</span>
      <span>Page 2 of 3</span>
    </div>
  </div>
  <div class="page">
    <h1>Page 3</h1>
    <p>This is the third page.</p>
    <div class="footer">
      <span>Smart Spend Proposal</span>
      <span>Page 3 of 3</span>
    </div>
  </div>
</body>
</html>
